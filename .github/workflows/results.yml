name: results
on:
  schedule:
    - cron: '*/15 * * * *'   # 每 15 分钟：只查完赛结果（纯 ESPN，零赔率额度）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish          # 与 scrape 共用，串行化避免推送竞争
  cancel-in-progress: false

jobs:
  results:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装依赖
        run: pip install -q -r app/requirements.txt
      - name: 回填赛果 + 结算 + 刷新页面（零额度）
        working-directory: app
        run: python scrape.py --results-only
      - name: 同步网页到 docs
        run: |
          rsync -a app/reports/ docs/
          touch docs/.nojekyll
      - name: 提交（带 rebase 重试，防与 scrape 竞争）
        run: |
          git config user.name "football-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "results check $(date -u '+%m-%d %H:%M')"
          for i in 1 2 3; do
            git pull --rebase -X ours && git push && exit 0
            sleep 5
          done
          exit 1
